<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendar — WHAPIGEN</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        :root {
            --bg: #0b1220;
            --primary-gradient: linear-gradient(135deg, #25d366 0%, #26a9ff 100%);
        }
        body {
            background-color: var(--bg);
            /* Efecto de resplandor de fondo para que no sea "triste" */
            background-image: radial-gradient(circle at top right, rgba(38, 169, 255, 0.1), transparent),
                              radial-gradient(circle at bottom left, rgba(37, 211, 102, 0.05), transparent);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
        }
        .header-container {
            text-align: center;
            padding: 60px 20px 20px;
            max-width: 800px;
        }
        /* Título con el degradado de tu marca */
        .gradient-text {
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #a7b3c6;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }
        /* Botón de volver con estilo de la web */
        .back-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 10px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #26a9ff;
        }
        /* Contenedor del widget con efecto cristal */
        .calendly-wrapper {
            width: 100%;
            max-width: 1000px;
            background: rgba(15, 22, 40, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            margin-bottom: 50px;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <a href="index.html" class="back-btn">← Volver al inicio</a>
        <h1 class="gradient-text">Configurá tu cita</h1>
        <p class="subtitle">Estás a un paso de escalar tu atención con Inteligencia Artificial.</p>
    </div>

    <div class="calendly-wrapper">
        <div class="calendly-inline-widget" 
             data-url="https://calendly.com/d/cxsg-78n-tmz?hide_gdpr_banner=1&background_color=0b1220&text_color=ffffff&primary_color=26a9ff" 
             style="min-width:320px; height:700px; width: 100%;">
        </div>
    </div>

    <script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>
</body>
</html>
